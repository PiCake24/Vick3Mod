gtsr_social_events.1.t: "The Lynching of the Giant-Girl Police"
gtsr_social_events.1.d: "After our giant girls joined the police force, there were a large number of reports of giant girls police brutally abusing humans in places like [SCOPE.sState('gts_violence_state').GetName]."
gtsr_social_events.1.f: ""The clothes are not in line with the aesthetics", "walking too fast"... and even "not kneeling down when seeing the police officers" have become their reasons for arbitrarily executing human beings.\n\nMany residents were crushed in the street by the giant police officers on patrol."
gtsr_diplomatic.1.t: "Impatient giant bitch"
gtsr_diplomatic.1.d: "[SCOPE.sCountry('rival_scope').GetName] protested to us that one of our giants crossed the border and wreaked havoc in their city."
gtsr_diplomatic.1.f: ""Anyway, sooner or later I will crush you, so what if it's a few days earlier? "The giant lady said this before leaving.\n\nThe other party asked us to give an explanation."
gtsr_diplomatic.1.a: "I think she's right"
gtsr_diplomatic.1.b: "Go and ask her to apologize."
gtsr_social_events.2.t: "Juzu's "Justice Execution""
gtsr_social_events.2.d: "[SCOPE.sState('culture_state').GetName]'s [SCOPE.sCulture('state_minority_culture').GetName] settlement has been frequently destroyed by some local [concept_gts] recently."
gtsr_social_events.2.f: "They claim they are maintaining social order," a survivor complained to the newspaper, "They say they are eliminating pests from society. Although we are indeed not welcome, we are also human beings with human rights!" ""
gtsr_social_events.2.a: "Girls, remember not to leave any survivors next time."
gtsr_social_events.2.b: "We'll take care of those savage giants"
gtsr_tech_events.1.t: "The tallest giant girl"
gtsr_tech_events.1.d: "Today, our first ship girl completed her outfitting, but something unexpected happened"
gtsr_tech_events.1.f: "This is the first time that a warship girl has grown to such an extent. She obviously did not see the city below her feet. Although the coastal defense troops fired at her desperately to try to attract her attention, before she could react, she still caused considerable damage to the city of [SCOPE.sState('warshipgirls_victim').GetName]"
gtsr_tech_events.1.a: "It was announced to the outside world that this was an exercise using abandoned cities."
gtsr_tech_events.1.b: "Throw her commander into her shoes and imprison him!"
gtsr_diplomatic.2.t: "City Destroyer"
gtsr_diplomatic.2.d: "In [SCOPE.sWar('gts_event_war').GetName], after our giant girl invaded the enemy's city, she specially used the Gigantamax technology to descend on the enemy-occupied city at a size of 100,000 times."
gtsr_diplomatic.2.f: "Although this kind of dynamism can only last for a few minutes, the horrific damage caused has already been spread by various newspapers. The photos of the huge footprints remaining in the city have undoubtedly caused huge panic among our enemies."
gtsr_diplomatic.2.a: "Fortunately she is from our side"

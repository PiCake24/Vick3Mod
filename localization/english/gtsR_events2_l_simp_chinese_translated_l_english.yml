l_english:
gtsr_industrial_events.1.t: "Private human beings"
gtsr_industrial_events.1.d: "We accidentally discovered that the giant girls in the giant girl clothing factory located in [SCOPE.sState('triangle_gts_cloth_factory_accident_state').GetName] often put human workers into shoes and put them on under the pretext of "testing shoe sizes."
gtsr_industrial_events.1.f: "Okay, okay, I'll just let them out." . . "\n\nAfter being caught by us, the giant girl had to admit it, took off her shoes and poured out the humans inside. These people had obviously been in her shoes for a long time, but most of them were still alive.\n\n"It's just to test the shoe size. The small people can measure more clearly in the shoes~"\n\nAlthough it was an excuse, due to the size of these giant girls, the workers did not dare to protest openly."
gtsr_industrial_events.1.1: "This method is very good. Please promote it more."
gtsr_industrial_events.1.2: "This is appalling, stop it immediately!"
gtsr_law_event.1.t: "Giant foot politics"
gtsr_law_event.1.d: "After hearing that our legislation had been thwarted, the giant girl, who had grown to a size ten thousand times, came to the sky above [ROOT.GetCountry.GetCapital.GetName]."
gtsr_law_event.1.f: ""I've seen it on the news, saying that the legislation is not going well~"\n\n"Then let me make things simpler. Anyone who does not support the legislation will be crushed by me~"\n\n"Ah...it seems that there are many civilians, well, this is called a necessary sacrifice, right?"
gtsr_law_event.1.1: "Shut up those politicians and step down!"
gtsr_law_event.1.2: "No, no, no, you can't hurt innocent people!"

law_tiny_rights1: "Full Human Rights"
law_tiny_rights1_desc: "Humans enjoy the same legal rights, protections, and opportunities as all other citizens. Their size grants neither privileges nor disadvantages under the law."
law_tiny_rights2: "Giant Maid Servants on Contract"
law_tiny_rights2_desc: "Tiny humans retain basic legal protections but may enter labor contracts that place them under the authority of giantess employers. Their rights are limited by their contractual obligations."
law_tiny_rights3: "Protected Property"
law_tiny_rights3_desc: "Tiny humans are no longer recognized as independent legal persons and are instead classified as property. However, laws regulate their treatment, and abuse, destruction, or theft of tiny humans remains punishable."
law_tiny_rights4: "Pets of Giantesses"
law_tiny_rights4_desc: "iny humans are regarded as companion creatures rather than people. Owners are expected to provide care and maintenance, but tiny humans possess no legal autonomy or rights of their own."
law_tiny_rights5: "Consumables"
law_tiny_rights5_desc: "Tiny humans are classified as consumable resources. They possess no legal protections, and their ownership, use, trade, and disposal are subject only to general regulations governing property and commerce."


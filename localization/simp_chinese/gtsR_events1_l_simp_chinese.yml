l_simp_chinese:
 gtsr_main.1.t:"巨大化事件报告"
 gtsr_main.1.d:"[ROOT.GetCountry.GetCapital.GetName]出现了大量少女巨大化的事件报告！"
 gtsr_main.1.f:"根据当地行政部门汇总的报告，在过去的一天里，有数百名少女巨大化到了十几米的身高，原因不明，但许多居民认为，可能跟最近的天文异象有关。\n\n“她们就在家中突然变得巨大，周围的街道和房屋一下子被她们庞大的身躯压扁了！\n\n“邻居们都说，最近晚上经常看到天空中有亮光闪过，还有人听到了什么东西的轰鸣声。”\n\n好在这些巨大少女们依然神智正常，地方政府已经将她们集中安置，学者们正在研究巨大化现象背后的原因"
 gtsr_main.1.a:"令人不安。"
 gtsr_main.1.tooltips:"[ROOT.GetCountry.GetCapital.GetName] 5%的人口变成[concept_gts]"

 gtsr_main.2.t:"巨大化逆向研究完成"
 gtsr_main.2.d:"我们已经初步明白了这些巨大化的少女————现在我们称之为“[concept_gts]”————的秘密。"
 gtsr_main.2.f:"学者们研究发现，不管这些少女最初巨大化的原因是什么，她们如今的体液中也蕴含了能够使人巨大化的东西，不过现阶段的测试表明，只有14-30岁左右的部分少女能够获得这种能力。\n\n现在，我们已经可以通过提取她们的体液，来让更多少女巨大化了！"
 gtsr_main.2.a:"她们将使我国再次伟大！"
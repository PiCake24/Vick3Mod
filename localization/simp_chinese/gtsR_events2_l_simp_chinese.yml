l_simp_chinese:
 gtsr_industrial_events.1.t:"私藏人类"
 gtsr_industrial_events.1.d:"我们意外发现位于[SCOPE.sState('triangle_gts_cloth_factory_accident_state').GetName]的巨娘衣物工厂中的巨娘们，经常以“测试鞋码”为由，将人类工人丢进鞋子里穿上。"
 gtsr_industrial_events.1.f:"“好啦好啦，我放她们出来就是了。。。”\n\n被我们抓现行之后，那位巨娘只得承认，并脱下鞋子把里面的人类倒了出来，这些人显然已经被她穿在鞋子里很久了，不过大部分人都还活着。\n\n“就是测试鞋码啊，小人在鞋子里测量的比较清楚嘛~”\n\n虽然一眼借口，但是迫于这些巨娘的体型，工人们也不敢明面上抗议。"
 gtsr_industrial_events.1.1:"这个方法挺好的啊，多多推广。"
 gtsr_industrial_events.1.2:"骇人听闻，立刻叫停！"


 gtsr_law_event.1.t:"巨娘足底政治"
 gtsr_law_event.1.d:"在听闻我们的立法受挫后，巨大化到了万倍的巨娘，来到了[ROOT.GetCountry.GetCapital.GetName]的上空。"
 gtsr_law_event.1.f:"“新闻上我都看到了哦，说什么立法不顺利什么的~”\n\n“那我就来把事情变得简单一点吧，不支持立法的人，统统会被我踩扁哦~”\n\n“啊...好像还有不少平民呢，嘛，这叫必要的牺牲对不对”"
 gtsr_law_event.1.1:"让那些政客闭嘴吧，踩下去！"
 gtsr_law_event.1.2:"不不不，不能伤及无辜啊！"

